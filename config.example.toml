# Browser must be "chrome" or "edge".
browser = "chrome"

# Input files. Empty files are skipped.
subreddits_file = "inputs/subreddits.txt"
users_file = "inputs/users.txt"

# Arctic Shift download page.
download_tool_url = "https://arctic-shift.photon-reddit.com/download-tool"

# Dates use YYYY-MM-DD.
# Empty start_date keeps the Arctic Shift default earliest date.
# Empty end_date means today.
start_date = ""
end_date = ""

download_posts = true
download_comments = true

# Where Chrome or Edge should save downloads.
download_dir = "downloads"

# Wait after each completed download before refreshing the page.
wait_after_download_seconds = 5

# How long to wait for one item before failing.
download_timeout_seconds = 1800

# How often to check the page and download folder.
poll_interval_seconds = 2

# Keep false if you want to see the browser.
headless = false
